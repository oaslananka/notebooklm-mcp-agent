name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "37 2 * * 2"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  UV_VERSION: "0.11.15"

jobs:
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install "uv==${UV_VERSION}"
      - name: Install dependencies
        run: uv sync --locked --extra dev --extra browser
      - name: Export audit requirements
        run: uv --quiet export --locked --all-extras --all-groups --no-emit-project --format requirements.txt --output-file audit-requirements.txt
      - name: pip-audit
        run: uv run pip-audit --strict --requirement audit-requirements.txt
      - name: Bandit
        run: uv run bandit -r src
      - name: Secret-pattern check
        run: uv run python scripts/check_no_secrets.py
      - name: Gitleaks
        run: |
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          "$HOME/go/bin/gitleaks" git --redact .
      - name: actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          "$HOME/go/bin/actionlint" .github/workflows/*.yml
      - name: zizmor
        run: uv run zizmor --min-severity medium .github/workflows
