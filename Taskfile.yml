version: "3"

vars:
  IMAGE: notebooklm-mcp-agent:dev

tasks:
  setup:
    desc: Install locked development dependencies.
    cmds:
      - uv sync --locked --extra dev --extra browser
      - uv run pre-commit install --install-hooks

  lint:
    desc: Run Ruff, owner, forbidden-term, secret, and structural checks.
    cmds:
      - uv run ruff check .
      - uv run ruff format --check .
      - uv run python scripts/check_owner_refs.py
      - uv run python scripts/check_forbidden_terms.py
      - uv run python scripts/check_no_secrets.py
      - uv run python scripts/check_config_docs.py
      - uv run python scripts/check_public_surface.py
      - uv run python scripts/check_tool_catalog.py
      - uv run python scripts/check_openapi_parity.py
      - uv run python scripts/check_architecture.py
      - uv run vulture src tests scripts --min-confidence 90

  format:
    desc: Apply Python formatting and safe Ruff fixes.
    cmds:
      - uv run ruff check --fix .
      - uv run ruff format .

  typecheck:
    desc: Run mypy over source and tests.
    cmds:
      - uv run mypy src tests

  test:
    desc: Run the default non-live test suite.
    cmds:
      - uv run pytest

  test:unit:
    desc: Run unit tests.
    cmds:
      - uv run pytest tests/unit tests/test_bootstrap.py tests/test_cli.py

  test:integration:
    desc: Run offline integration tests.
    cmds:
      - uv run pytest tests/integration

  test:e2e:
    desc: Run live E2E tests when explicitly enabled.
    cmds:
      - uv run pytest -m e2e

  build:
    desc: Build Python distributions and the local Docker image.
    cmds:
      - uv run python -m build
      - docker build -f deploy/Dockerfile -t {{.IMAGE}} .

  docs:
    desc: Build documentation strictly.
    env:
      NO_MKDOCS_2_WARNING: "1"
    cmds:
      - uv run mkdocs build --strict

  docs:serve:
    desc: Serve documentation locally.
    env:
      NO_MKDOCS_2_WARNING: "1"
    cmds:
      - uv run mkdocs serve

  security:
    desc: Run local security checks.
    cmds:
      - uv --quiet export --locked --all-extras --all-groups --no-emit-project --format requirements.txt --output-file audit-requirements.txt
      - uv run pip-audit --strict --requirement audit-requirements.txt
      - uv run bandit -r src
      - uv run python scripts/check_no_secrets.py
      - gitleaks git --redact .
      - uv run python scripts/clean_artifacts.py

  sbom:
    desc: Generate a CycloneDX SBOM for the active environment.
    cmds:
      - uv run cyclonedx-py environment -o dist/notebooklm-mcp-agent.sbom.json

  catalog:
    desc: Regenerate public tool catalog and OpenAPI snapshot.
    cmds:
      - uv run python scripts/generate_tool_catalog.py
      - uv run python scripts/generate_openapi_snapshot.py
      - uv run python scripts/generate_cli_reference.py

  verify:structure:
    desc: Verify repository structure and architecture.
    cmds:
      - uv run python scripts/check_public_surface.py
      - uv run python scripts/check_architecture.py

  verify:docs:
    desc: Verify documentation drift and docs build.
    cmds:
      - uv run python scripts/check_config_docs.py
      - uv run python scripts/check_docs_commands.py
      - task docs

  verify:owner:
    desc: Verify canonical owner, forbidden terms, and secret hygiene.
    cmds:
      - uv run python scripts/check_owner_refs.py
      - uv run python scripts/check_forbidden_terms.py
      - uv run python scripts/check_no_secrets.py

  verify:release:
    desc: Verify release readiness without publishing.
    cmds:
      - task build
      - task sbom
      - uv run python scripts/check_release_ready.py
      - uv run python scripts/generate_checksums.py dist

  gc:
    desc: Run repository garbage-collection and drift scans.
    cmds:
      - uv run python scripts/check_owner_refs.py
      - uv run python scripts/check_forbidden_terms.py
      - uv run python scripts/check_no_secrets.py
      - uv run python scripts/check_config_docs.py
      - uv run python scripts/check_tool_catalog.py
      - uv run python scripts/check_openapi_parity.py
      - uv run python scripts/check_architecture.py
      - uv run vulture src tests scripts --min-confidence 90

  verify:
    desc: Run the full local required gate chain except live publishing.
    cmds:
      - task lint
      - task typecheck
      - task test
      - task docs
      - task security
      - task gc

  clean:
    desc: Remove generated local artifacts.
    cmds:
      - uv run python scripts/clean_artifacts.py
